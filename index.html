<!DOCTYPE html> <!-- Tells the browser this is an HTML5 document -->
<html lang="en"> <!-- Starts the HTML document and sets the language to English -->
<head>
  <meta charset="UTF-8" /> <!-- Defines character encoding (UTF-8 supports all languages) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Makes the site responsive on mobile -->
  <title>Abu Saleh | Data Scientist & Analyst</title> <!-- Title shown in the browser tab -->

  <!-- Favicon (small icon on browser tab) -->
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />

  <!-- TailwindCSS (utility-based styling framework) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- External stylesheet link -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Feather Icons (vector icons) and Vanta.js (animated background) -->
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-inter min-h-screen">
  <!-- Main body styling: light gray background, dark text, Inter font, full height -->

  <div id="vanta-background" class="vanta-background"></div>
  <!-- This empty div is where the animated background will appear -->

  <div id="app"></div>
  <!-- The #app div is like a container — script.js will load all component sections into this -->

  <!-- JavaScript file that loads and controls everything -->
  <script src="js/script.js"></script>
</body>
</html>
